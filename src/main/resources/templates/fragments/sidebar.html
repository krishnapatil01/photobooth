<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<body>
    <div th:fragment="sidebar" class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="logo-cam">📷</div>
            <div class="logo-words">
                <span class="logo-main">RETRO</span>
                <span class="logo-sub">BOOTH</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a th:href="@{/dashboard}" class="nav-item" id="nav-dashboard">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">DASHBOARD</span>
            </a>
            <a th:href="@{/photobooth}" class="nav-item" id="nav-photobooth">
                <span class="nav-icon">📷</span>
                <span class="nav-label">PHOTOBOOTH</span>
            </a>
            <a th:href="@{/gallery}" class="nav-item" id="nav-gallery">
                <span class="nav-icon">🖼️</span>
                <span class="nav-label">GALLERY</span>
            </a>
            <a th:href="@{/memory-corner}" class="nav-item" id="nav-memory">
                <span class="nav-icon">⭐</span>
                <span class="nav-label">MEMORY CORNER</span>
            </a>
        </nav>

        <div class="sidebar-bottom">
            <div class="film-reel-deco">🎞️ 🎞️ 🎞️</div>
            <form th:action="@{/logout}" method="post" style="margin:0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="logout-btn">
                    <span>🚪</span> LOGOUT
                </button>
            </form>
        </div>
    </div>

    <script>
        // Highlight active nav item based on current path
        (function () {
            var path = window.location.pathname;
            var map = {
                '/dashboard': 'nav-dashboard',
                '/photobooth': 'nav-photobooth',
                '/gallery': 'nav-gallery',
                '/memory-corner': 'nav-memory'
            };
            // Find matching nav item
            var activeId = null;
            Object.keys(map).forEach(function (key) {
                if (path === key || path.startsWith(key + '/')) {
                    activeId = map[key];
                }
            });
            // Default to dashboard if on /album/...
            if (!activeId && path.startsWith('/album')) activeId = 'nav-gallery';

            if (activeId) {
                var el = document.getElementById(activeId);
                if (el) el.classList.add('active');
            }
        })();
    </script>
</body>

</html>
